version: "3.9"

services:
  # ── API Gateway (nginx + Let's Encrypt TLS) ───────────────────────────────
  # Requires two env vars in .env.local (or exported):
  #   DOMAIN        — public domain pointing to this host, e.g. api.horion.pro
  #   CERTBOT_EMAIL — email for Let's Encrypt account / expiry notices
  #
  # First start: obtains a certificate via HTTP-01 challenge, then goes HTTPS.
  # Subsequent starts: reuses existing cert; background loop renews at <30 days.
  # For staging/testing: set CERTBOT_STAGING=true (avoids rate limits).
  gateway:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-api.horion.pro}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-ops@horion.pro}
      - CERTBOT_STAGING=${CERTBOT_STAGING:-false}
    env_file:
      - .env.local
    volumes:
      - letsencrypt:/etc/letsencrypt   # cert + account data (persisted)
      - certbot_webroot:/var/www/certbot  # ACME challenge files
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      # In dev: point to nginx gateway (https) or directly to api (http).
      # Use https://localhost when working through the gateway.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./horion-git-hub.pem:/run/secrets/github_private_key:ro
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://sre:local_only@postgres:5432/horion}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=us-east-1
      - ENV=local
      - DEBUG=true
      - LOG_LEVEL=debug
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
      target: dev
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=local
      - DEBUG=true
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    command: celery -A apps.worker.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./lumis-local-dev.2026-04-01.private-key.pem:/run/secrets/github_private_key:ro
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://sre:local_only@postgres:5432/horion}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=horion
      - AGENT_BASE_URL=http://agent:8001
      - ENV=local
      - DEBUG=true
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_only}
      POSTGRES_DB: ${POSTGRES_DB:-horion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d horion"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  letsencrypt:        # Let's Encrypt certs, account keys, renewal configs
  certbot_webroot:    # ACME HTTP-01 challenge files (shared nginx ↔ certbot)
