# ── Bootstrap config ─────────────────────────────────────────────────────────
# Used ONLY during the initial certificate request (before TLS is configured).
# Loaded via `nginx -c /etc/nginx/nginx-acme.conf`, so it must be a complete
# nginx configuration (events + http blocks), not just a server snippet.
# nginx stops and restarts with the full TLS config after certbot succeeds.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    server {
        listen      80;
        server_name _;

        # Serve ACME HTTP-01 challenge files from the shared webroot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Health probe while bootstrapping
        location /healthz {
            return 200 'bootstrapping\n';
            add_header Content-Type text/plain;
        }

        location / {
            return 200 'obtaining certificate — please wait\n';
            add_header Content-Type text/plain;
        }
    }
}
