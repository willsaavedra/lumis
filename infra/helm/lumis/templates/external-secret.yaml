{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lumis.fullname" . }}-app-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lumis.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "lumis.secretName" . }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ required "externalSecrets.secrets[0].remoteRef.key is required" (index .Values.externalSecrets.secrets 0).remoteRef.key }}
{{- end }}
