<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horion</title>
<!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f8f8f6;font-family:'JetBrains Mono',ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f8f8f6;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <!-- outer container -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background-color:#ffffff;border:1px solid #e4e4de;border-radius:8px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="padding:24px 32px;border-bottom:1px solid #e4e4de;background-color:#f8f8f6;">
              <div style="font-size:15px;font-weight:700;letter-spacing:-0.04em;color:#0a0a0a;font-family:'JetBrains Mono',ui-monospace,monospace;">
                horion.pro&#9608;
              </div>
              <div style="font-size:10px;color:#888880;letter-spacing:0.06em;margin-top:2px;font-family:'JetBrains Mono',ui-monospace,monospace;">
                RELIABILITY ENGINEERING PLATFORM
              </div>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:32px;">
              $content
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #e4e4de;background-color:#f8f8f6;">
              <p style="margin:0;font-size:11px;color:#888880;font-family:'JetBrains Mono',ui-monospace,monospace;line-height:1.6;">
                horion.pro &mdash; Reliability Engineering Platform<br />
                You received this email because you have an account on Horion.<br />
                Manage notification preferences in your <a href="https://app.horion.pro/settings" style="color:#888880;">account settings</a>.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
