apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumis-web
  namespace: lumis
  labels:
    app.kubernetes.io/name: lumis
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lumis
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: lumis-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: lumis-config
                  key: NEXT_PUBLIC_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lumis-web
  namespace: lumis
spec:
  selector:
    app.kubernetes.io/component: web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
