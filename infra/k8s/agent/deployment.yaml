apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumis-agent
  namespace: lumis
  labels:
    app.kubernetes.io/name: lumis
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lumis
        app.kubernetes.io/component: agent
    spec:
      containers:
        - name: agent
          image: lumis-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: lumis-config
            - secretRef:
                name: lumis-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "5Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: lumis-agent
  namespace: lumis
spec:
  selector:
    app.kubernetes.io/component: agent
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
