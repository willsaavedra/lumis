{{- if and .Values.secrets.create (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lumis.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lumis.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  API_KEY_SALT: {{ .Values.secrets.apiKeySalt | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  DATABASE_URL: {{ include "lumis.databaseUrl" . | quote }}
  REDIS_URL: {{ include "lumis.redisUrl" . | quote }}
  CELERY_BROKER_URL: {{ include "lumis.celeryBrokerUrl" . | quote }}
  CELERY_RESULT_BACKEND: {{ include "lumis.celeryResultBackend" . | quote }}
  S3_ACCESS_KEY_ID: {{ if .Values.secrets.s3AccessKeyId }}{{ .Values.secrets.s3AccessKeyId | quote }}{{ else if .Values.minio.bundled.enabled }}{{ .Values.minio.rootUser | quote }}{{ else }}{{ fail "helm: set secrets.s3AccessKeyId or enable minio.bundled" }}{{ end }}
  S3_SECRET_ACCESS_KEY: {{ if .Values.secrets.s3SecretAccessKey }}{{ .Values.secrets.s3SecretAccessKey | quote }}{{ else if .Values.minio.bundled.enabled }}{{ .Values.minio.rootPassword | quote }}{{ else }}{{ fail "helm: set secrets.s3SecretAccessKey or enable minio.bundled" }}{{ end }}
{{- end }}
