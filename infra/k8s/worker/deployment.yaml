apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumis-worker
  namespace: lumis
  labels:
    app.kubernetes.io/name: lumis
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lumis
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: lumis-api:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "apps.worker.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: lumis-config
            - secretRef:
                name: lumis-secrets
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "celery -A apps.worker.celery_app inspect ping -d celery@$HOSTNAME"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: lumis-worker
  namespace: lumis
spec:
  scaleTargetRef:
    name: lumis-worker
  minReplicaCount: 1
  maxReplicaCount: 20
  cooldownPeriod: 60
  triggers:
    - type: redis
      metadata:
        address: redis:6379
        listName: celery
        listLength: "5"
