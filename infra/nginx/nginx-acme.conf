# ── Bootstrap config ─────────────────────────────────────────────────────────
# Used ONLY during the initial certificate request (before TLS is configured).
# nginx starts with this file, certbot completes the HTTP-01 challenge, then
# nginx is stopped and restarted with the full nginx.conf.template config.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen      80;
    server_name _;

    # Serve ACME challenge files from the shared webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Health / liveness probe while bootstrapping
    location /healthz {
        return 200 'bootstrapping\n';
        add_header Content-Type text/plain;
    }

    location / {
        return 200 'obtaining certificate — please wait\n';
        add_header Content-Type text/plain;
    }
}
