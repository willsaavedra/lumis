services:
  api:
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages:/workspace/packages
    environment:
      - DEBUG=true
      - LOG_LEVEL=debug

  agent:
    command: python -m uvicorn apps.agent.server:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./apps/agent:/workspace/apps/agent
      - ./packages:/workspace/packages
    environment:
      - DEBUG=true

  worker:
    command: celery -A apps.worker.celery_app worker --loglevel=debug --concurrency=1 -E
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./apps/worker:/workspace/apps/worker
      - ./packages:/workspace/packages
    environment:
      - DEBUG=true

  flower:
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis
      - worker
