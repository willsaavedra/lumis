name: Agent Quality Gate

on:
  pull_request:
    paths:
      - 'apps/agent/**'
      - 'eval/**'
      - 'scripts/eval.py'

jobs:
  eval:
    name: Eval – Precision / Recall / FPR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r apps/agent/requirements.txt
          pip install pyyaml

      - name: Run static-only eval (no LLM — fast and free)
        run: |
          python scripts/eval.py --no-llm 2>&1 | tee results/ci_eval.txt
        env:
          PYTHONPATH: .

      - name: Check for regressions against baseline
        run: |
          if [ -f results/baseline.json ]; then
            python scripts/eval.py --no-llm --baseline results/baseline.json 2>&1
          else
            echo "No baseline found — skipping regression check. Run eval.py and commit results/baseline.json."
          fi
        env:
          PYTHONPATH: .

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: results/
          retention-days: 30

      - name: Comment eval summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'results/ci_eval.txt';
            if (!fs.existsSync(path)) {
              console.log('No eval output file found');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            const comment = `### Agent Quality Eval\n\`\`\`\n${body}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });
