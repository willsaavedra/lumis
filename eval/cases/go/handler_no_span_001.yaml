id: go-handler-no-span-001
language: go
category: handler_no_span
severity: critical
description: >
  Gin HTTP handler processes a payment request but never starts a trace span.
  Request duration, status codes, and errors are completely blind in APM.

snippet: |
  package api

  import (
      "github.com/gin-gonic/gin"
  )

  func (h *Handler) CreateOrder(c *gin.Context) {
      var req CreateOrderRequest
      if err := c.ShouldBindJSON(&req); err != nil {
          c.JSON(400, gin.H{"error": err.Error()})
          return
      }

      order, err := h.svc.CreateOrder(c.Request.Context(), req)
      if err != nil {
          c.JSON(500, gin.H{"error": "internal error"})
          return
      }

      c.JSON(201, order)
  }

expected_findings:
  - category: handler_no_span
    severity: critical
    file_path: snippet
    line_hint: 7

expected_no_findings:
  - category: pii_in_logs
  - category: high_cardinality_label

annotated_by: eng-team
version: 1
